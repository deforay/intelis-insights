# Optional local InteLIS MySQL for demos / client installs without a host MySQL.
#
# Usage:
#   cp .env.example .env
#   # set LAB_DB_HOST=intelis-mysql, LAB_DB_PASSWORD, and LOCAL_LAB_MYSQL_ROOT_PASSWORD
#   # uncomment COMPOSE_FILE and COMPOSE_PATH_SEPARATOR in .env
#   # place an approved .sql/.sql.gz dump in ./mysql-init before first startup
#   docker compose up -d

services:
  init:
    depends_on:
      intelis-mysql:
        condition: service_healthy
    environment:
      LAB_DB_HOST: intelis-mysql
      LAB_DB_PORT: 3306
      LAB_DB_NAME: ${LAB_DB_NAME:-intelis}
      LAB_DB_USER: ${LAB_DB_USER:-intelis_reader}
      LAB_DB_PASSWORD: ${LAB_DB_PASSWORD:?Set LAB_DB_PASSWORD for the local InteLIS MySQL read-only user}

  app:
    depends_on:
      intelis-mysql:
        condition: service_healthy
    environment:
      LAB_DB_HOST: intelis-mysql
      LAB_DB_PORT: 3306
      LAB_DB_NAME: ${LAB_DB_NAME:-intelis}
      LAB_DB_USER: ${LAB_DB_USER:-intelis_reader}
      LAB_DB_PASSWORD: ${LAB_DB_PASSWORD:?Set LAB_DB_PASSWORD for the local InteLIS MySQL read-only user}

  intelis-mysql:
    image: mysql:8.4
    container_name: intelis-insights-local-mysql
    restart: unless-stopped
    # InteLIS dumps need a permissive MySQL config to import cleanly:
    #   - innodb-strict-mode=OFF: form_vl has 245 columns and trips
    #     MySQL 8's worst-case row-size pre-check at CREATE TABLE time
    #     even though DYNAMIC pushes varchars off-page fine.
    #   - innodb-default-row-format=DYNAMIC: explicit for clarity.
    #   - sql-mode='': InteLIS data routinely contains 0000-00-00 dates,
    #     empty strings into NOT NULL numerics, etc. — legacy that
    #     MySQL 8's default STRICT mode rejects.
    command:
      - mysqld
      - --innodb-strict-mode=OFF
      - --innodb-default-row-format=DYNAMIC
      - --sql-mode=
    environment:
      MYSQL_ROOT_PASSWORD: ${LOCAL_LAB_MYSQL_ROOT_PASSWORD:?Set LOCAL_LAB_MYSQL_ROOT_PASSWORD for the local InteLIS MySQL container}
      MYSQL_DATABASE: ${LAB_DB_NAME:-intelis}
      LOCAL_LAB_DB_USER: ${LAB_DB_USER:-intelis_reader}
      LOCAL_LAB_DB_PASSWORD: ${LAB_DB_PASSWORD:?Set LAB_DB_PASSWORD for the local InteLIS MySQL read-only user}
    ports:
      - "127.0.0.1:${LOCAL_LAB_MYSQL_PORT:-3307}:3306"
    volumes:
      - intelis_mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  intelis_mysql_data:
