version: "3.9"
services:
  app:
    build: .
    container_name: intelis-app
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: ${APP_PORT:-8080}
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-vlsm}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-codegemma:7b-instruct}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./var:/var/www/app/var
    depends_on:
      - qdrant
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=${ENABLE_TRAEFIK:-false}"
      - "traefik.http.routers.intelis-app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.intelis-app.entrypoints=websecure"
      - "traefik.http.routers.intelis-app.tls=true"
      - "traefik.http.routers.intelis-app.tls.certresolver=le"
      - "traefik.http.routers.intelis-app-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.intelis-app-http.entrypoints=web"
      - "traefik.http.routers.intelis-app-http.middlewares=intelis-https-redirect"
      - "traefik.http.middlewares.intelis-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.services.intelis-app.loadbalancer.server.port=80"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports: ["6333:6333"]
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - default

  rag-api:
    build: ./rag-api
    container_name: rag-api
    env_file: .env
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-intelis_rag}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
    ports: ["8089:8089"]
    depends_on: [qdrant]
    networks:
      - default

  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/etc/traefik/acme/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik_data/acme.json:/etc/traefik/acme/acme.json
    networks:
      - proxy
    profiles: ["proxy"]

networks:
  proxy: {}
