site_name: InteLIS Insights
site_description: Natural-language analytics for laboratory data. FOSS, AGPLv3.
site_url: https://deforay.github.io/intelis-insights/
site_author: Deforay Technical Services and contributors
repo_url: https://github.com/deforay/intelis-insights
repo_name: deforay/intelis-insights
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Deforay Technical Services and contributors. AGPLv3.

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: system theme
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: light mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: dark mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/deforay/intelis-insights

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Query flow: query-flow.md
  - Privacy & RBAC: privacy-and-rbac.md
  - LLM providers: llm-providers.md
  - Contributing: contributing.md
  - Implementation plan: plan.md
